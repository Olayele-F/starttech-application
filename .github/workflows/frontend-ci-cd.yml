name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

env:
  AWS_REGION:   us-east-1
  NODE_VERSION: '20'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --coverage --ci
        env:
          CI: true

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_ENV: production
          CI: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  deploy:
    name: Deploy → S3 + CloudFront
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: build/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (hashed assets — long cache)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
        run: aws s3 sync build/ s3://${S3_BUCKET} --delete --cache-control "public,max-age=31536000,immutable" --exclude "index.html" --exclude "*.json"

      - name: Sync to S3 (entry points — no cache)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          aws s3 cp build/index.html s3://${S3_BUCKET}/index.html --cache-control "no-cache,no-store,must-revalidate"
          aws s3 sync build/ s3://${S3_BUCKET} --exclude "*" --include "*.json" --cache-control "no-cache"

      - name: Invalidate CloudFront
        env:
          CF_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          INV_ID=$(aws cloudfront create-invalidation --distribution-id ${CF_DIST_ID} --paths "/*" --query 'Invalidation.Id' --output text)
          echo "Invalidation: $INV_ID"
          aws cloudfront wait invalidation-completed --distribution-id ${CF_DIST_ID} --id "$INV_ID"

      - name: Smoke test
        env:
          CF_DOMAIN: ${{ secrets.CLOUDFRONT_DOMAIN }}
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://${CF_DOMAIN}")
          [ "$STATUS" -eq 200 ] || { echo "Smoke test failed: $STATUS"; exit 1; }
          echo "Smoke test passed: HTTP $STATUS"